services:
  postgres:
    image: postgres:16-alpine
    container_name: buddhi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: buddhi
      POSTGRES_PASSWORD: buddhi
      POSTGRES_DB: buddhi
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buddhi -d buddhi"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://buddhi:buddhi@postgres:5432/buddhi?schema=public
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    env_file:
      - .env
    ports:
      - "3000:3000"

volumes:
  postgres-data:
